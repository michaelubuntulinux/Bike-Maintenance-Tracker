<h2 mat-dialog-title>Registrar salida</h2>
<mat-dialog-content>
  <form class="form" [formGroup]="form" id="ride-form" (ngSubmit)="save()">
    <mat-form-field appearance="outline">
      <mat-label>Fecha</mat-label>
      <input matInput type="date" formControlName="date" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Horas utilizadas</mat-label>
      <input matInput type="number" step="0.1" min="0.1" formControlName="hours" />
      <mat-hint>Ej: 2.5</mat-hint>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Kilómetros (opcional)</mat-label>
      <input matInput type="number" step="0.1" min="0" formControlName="kilometers" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Tipo de salida</mat-label>
      <mat-select formControlName="rideTypeId">
        @for (t of rideTypes; track t.id) {
          <mat-option [value]="t.id">{{ t.label }}</mat-option>
        }
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Comentarios</mat-label>
      <textarea matInput rows="3" formControlName="comments"></textarea>
    </mat-form-field>

    @if (error) {
      <p class="error">{{ error }}</p>
    }
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button type="button" mat-dialog-close>Cancelar</button>
  <button mat-flat-button color="primary" type="submit" form="ride-form" [disabled]="saving">
    Guardar
  </button>
</mat-dialog-actions>
