<h2 mat-dialog-title>Editar · {{ title }}</h2>
<mat-dialog-content>
  <form class="form" [formGroup]="form" id="maint-edit-form" (ngSubmit)="save()">
    <mat-form-field appearance="outline">
      <mat-label>Horas desde el último servicio</mat-label>
      <input matInput type="number" step="0.1" min="0" formControlName="hoursSinceLast" />
      <mat-hint>Se reinicia al “Realizar mantenimiento”</mat-hint>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Horas totales de uso</mat-label>
      <input matInput type="number" step="0.1" min="0" formControlName="totalUsageHours" />
      <mat-hint>Vida útil del componente desde que se adquirió (no se reinicia)</mat-hint>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Intervalo recomendado (horas)</mat-label>
      <input matInput type="number" step="1" min="1" formControlName="intervalHours" />
      <mat-hint>Cada cuántas horas deberías hacerlo</mat-hint>
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Notas</mat-label>
      <textarea matInput rows="2" formControlName="notes"></textarea>
    </mat-form-field>

    @if (error) {
      <p class="error">{{ error }}</p>
    }
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button type="button" mat-dialog-close>Cancelar</button>
  <button mat-flat-button color="primary" type="submit" form="maint-edit-form" [disabled]="saving">
    Guardar
  </button>
</mat-dialog-actions>
