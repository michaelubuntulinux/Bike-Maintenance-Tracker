<h2 mat-dialog-title>{{ title }}</h2>
<mat-dialog-content>
  <p>
    Se reinicia solo el contador “desde el último”. Las <strong>horas totales de uso</strong> del
    componente se conservan.
  </p>
  <form class="form" [formGroup]="form" id="maint-form" (ngSubmit)="save()" style="display:grid;gap:.4rem">
    <mat-form-field appearance="outline">
      <mat-label>Fecha</mat-label>
      <input matInput type="date" formControlName="date" />
    </mat-form-field>
    <mat-form-field appearance="outline">
      <mat-label>Notas</mat-label>
      <textarea matInput rows="3" formControlName="notes"></textarea>
    </mat-form-field>
    @if (error) {
      <p style="color: var(--mat-sys-error)">{{ error }}</p>
    }
  </form>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button type="button" mat-dialog-close>Cancelar</button>
  <button mat-flat-button color="primary" type="submit" form="maint-form" [disabled]="saving">
    Confirmar
  </button>
</mat-dialog-actions>
